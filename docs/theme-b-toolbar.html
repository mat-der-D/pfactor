<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>テーマB ツールボタン改善</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;700&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #2a2a2a;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    gap: 40px;
    padding: 32px;
    font-family: 'Noto Sans JP', sans-serif;
  }

  .mock-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .mock-label {
    color: #aaa;
    font-size: 13px;
    letter-spacing: 0.1em;
  }

  .frame {
    width: 337px;
    height: 599px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border-radius: 10px;
    border: 1px solid #c8bfaa;
  }

  .panel {
    background: #e8e2d4;
    border-bottom: 2px solid #b8b0a0;
    padding: 14px 16px 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .panel-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #888070;
    margin-bottom: 5px;
  }

  .digits { display: flex; gap: 4px; }

  .digit-box {
    width: 38px; height: 50px;
    border-radius: 3px;
    background: #fff;
    color: #1a1a1a;
    border: 1.5px solid #b8b0a0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 26px;
    font-weight: 700;
  }

  .divider {
    width: 1px; height: 40px;
    background: #b8b0a0;
    flex-shrink: 0;
  }

  .timer-display {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 22px;
    font-weight: 400;
    color: #1a1a1a;
    white-space: nowrap;
    letter-spacing: 0.03em;
  }

  .timer-display .ms { font-size: 15px; color: #888070; }

  .controls { display: flex; gap: 6px; margin-left: auto; }

  .btn {
    width: 38px; height: 38px;
    border-radius: 50%; border: none;
    cursor: pointer; font-size: 15px;
    display: flex; align-items: center; justify-content: center;
  }

  .btn-primary { background: #1a1a1a; color: #fff; }
  .btn-stop    { background: #c05050; color: #fff; opacity: 0.3; }

  .canvas-section {
    flex: 1;
    background: #f5f2eb;
    display: flex;
    flex-direction: column;
    padding: 10px 12px 12px;
    gap: 8px;
  }

  /* ── ツールバー ── */
  .toolbar {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .tool-btn {
    width: 34px; height: 34px;
    border-radius: 5px;
    border: 1.5px solid #c8bfaa;
    background: #ede8de;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, border-color 0.15s;
  }

  .tool-btn svg {
    width: 17px; height: 17px;
    stroke: #6a6050;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    transition: stroke 0.15s;
  }

  .tool-btn.active {
    background: #1a1a1a;
    border-color: #1a1a1a;
  }

  .tool-btn.active svg { stroke: #fff; }

  .tool-btn.trash { margin-left: auto; }
  .tool-btn.trash:hover { border-color: #c05050; }
  .tool-btn.trash:hover svg { stroke: #c05050; }

  .canvas-bg {
    flex: 1;
    background: #f5f2eb;
    border-radius: 4px;
    border: 1px solid #c8bfaa;
    background-image: repeating-linear-gradient(
      transparent, transparent 27px, rgba(0,0,0,0.06) 28px
    );
  }
</style>
</head>
<body>

<div class="mock-wrap">
  <div class="mock-label">B — SVGアイコン版</div>
  <div class="frame">
    <div class="panel">
      <div>
        <div class="panel-label">Number</div>
        <div class="digits">
          <div class="digit-box">3</div>
          <div class="digit-box">7</div>
          <div class="digit-box">2</div>
          <div class="digit-box">9</div>
        </div>
      </div>
      <div class="divider"></div>
      <div>
        <div class="panel-label">Time</div>
        <div class="timer-display">1'23''<span class="ms">456</span></div>
      </div>
      <div class="controls">
        <button class="btn btn-primary">⏸</button>
        <button class="btn btn-stop">⏹</button>
      </div>
    </div>

    <div class="canvas-section">
      <div class="toolbar">
        <!-- 鉛筆（active） -->
        <button class="tool-btn active" title="鉛筆">
          <svg viewBox="0 0 24 24">
            <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>
          </svg>
        </button>
        <!-- 消しゴム -->
        <button class="tool-btn" title="消しゴム">
          <svg viewBox="0 0 24 24">
            <path d="M20 20H7L3 16l10-10 7 7-2.5 2.5"/>
            <path d="M6.5 17.5l4-4"/>
          </svg>
        </button>
        <!-- ゴミ箱 -->
        <button class="tool-btn trash" title="全消去">
          <svg viewBox="0 0 24 24">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14H6L5 6"/>
            <path d="M10 11v6M14 11v6"/>
            <path d="M9 6V4h6v2"/>
          </svg>
        </button>
      </div>
      <div class="canvas-bg"></div>
    </div>
  </div>
</div>

</body>
</html>
